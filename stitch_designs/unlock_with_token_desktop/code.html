<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bioluminescent-glow {
            background: radial-gradient(circle at 50% 50%, #06b77f20 0%, transparent 70%);
        }
        .glass-card {
            background: rgba(18, 50, 39, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Ambient Background Effects -->
<div class="fixed inset-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
<div class="absolute inset-0 bioluminescent-glow"></div>
</div>
<!-- Main Auth Canvas -->
<main class="relative flex-1 flex items-center justify-center p-6 z-10">
<!-- Central Unlock Card -->
<div class="max-w-[480px] w-full">
<div class="glass-card p-10 rounded-lg border border-outline-variant/10 shadow-[40px_0_60px_-10px_rgba(0,0,0,0.6)] flex flex-col items-center text-center">
<!-- Brand Anchor -->
<div class="mb-8 flex flex-col items-center">
<div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(105,246,184,0.3)]">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="potted_plant">potted_plant</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Unlock your garden</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">Enter your Access Token to enter the Lab</p>
</div>
<!-- Input Section -->
<div class="w-full space-y-6">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="key">key</span>
</div>
<input class="w-full bg-surface-container-highest/50 border-1.5 border-outline-variant/20 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all font-mono" placeholder="••••••••••••••••" type="password"/>
</div>
<!-- CTA Button -->
<button class="w-full bg-secondary hover:bg-secondary-dim active:scale-[0.98] text-on-secondary font-bold py-4 rounded-full shadow-[0_8px_24px_rgba(248,160,16,0.25)] transition-all flex items-center justify-center gap-2 group">
                        Unlock Garden
                        <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Syncing Progress Section -->
<div class="mt-12 w-full">
<div class="flex items-center justify-between mb-3 px-1">
<span class="text-[11px] uppercase tracking-[0.15em] font-bold text-on-surface-variant">Syncing with Seedify Lab</span>
<span class="text-[11px] font-mono text-primary">v2.1.0</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary shadow-[0_0_12px_rgba(105,246,184,0.5)] w-[65%] rounded-full relative">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-on-primary/20 to-transparent"></div>
</div>
</div>
<div class="mt-4 flex justify-center gap-4">
<div class="flex items-center gap-1.5 text-[12px] text-on-surface-variant/60">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user">verified_user</span>
                            Encrypted
                        </div>
<div class="flex items-center gap-1.5 text-[12px] text-on-surface-variant/60">
<span class="material-symbols-outlined text-[14px]" data-icon="sensors">sensors</span>
                            Mainnet
                        </div>
</div>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center gap-8 px-4">
<button class="text-xs uppercase tracking-widest font-bold text-on-surface-variant hover:text-primary transition-colors">Request Access</button>
<div class="w-1 h-1 rounded-full bg-outline-variant/30 self-center"></div>
<button class="text-xs uppercase tracking-widest font-bold text-on-surface-variant hover:text-primary transition-colors">Troubleshoot</button>
</div>
</div>
</main>
<!-- Decorative Corner Elements -->
<div class="fixed bottom-12 right-12 flex flex-col items-end gap-2 opacity-40">
<p class="text-[10px] uppercase tracking-[0.3em] font-bold text-on-surface-variant">Laboratory Status</p>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#69f6b8]"></span>
<span class="text-[13px] font-mono text-primary">Stable Environment</span>
</div>
</div>
