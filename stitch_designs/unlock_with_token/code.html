<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Top Navigation Suppression: Not shown on onboarding/transactional screens as per rules -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 overflow-hidden">
<!-- Background Organic Shape Decor -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Content Canvas -->
<div class="w-full max-w-md space-y-12 relative z-10">
<!-- Hero Section -->
<div class="text-center space-y-4">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-surface-container mb-6 ring-1 ring-outline-variant/30">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="lock_open">lock_open</span>
</div>
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface">
                    Unlock your garden
                </h1>
<p class="text-on-surface-variant text-lg">
                    Enter your master seed token to access your digital ecosystem and personal vaults.
                </p>
</div>
<!-- Interaction Form -->
<div class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant ml-1">Access token</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg h-16 px-6 text-primary font-mono placeholder:text-outline-variant focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="••••••••••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center space-x-2">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<button class="w-full bg-secondary hover:bg-secondary-dim text-on-secondary font-bold h-16 rounded-full flex items-center justify-center space-x-3 transition-all active:scale-95 shadow-[0_20px_40px_-15px_rgba(248,160,16,0.3)]">
<span class="material-symbols-outlined" data-icon="key" style="font-variation-settings: 'FILL' 1;">key</span>
<span class="text-lg">Unlock Garden</span>
</button>
</div>
<!-- Loading State Preview (Manual Render) -->
<div class="pt-8 space-y-8 animate-pulse">
<div class="flex flex-col items-center space-y-4">
<!-- Seed Animation Placeholder -->
<div class="relative w-12 h-12">
<div class="absolute inset-0 bg-primary/20 rounded-full seed-pulse animate-ping"></div>
<div class="relative flex items-center justify-center w-full h-full bg-surface-container-high rounded-full ring-2 ring-primary/40">
<span class="material-symbols-outlined text-primary" data-icon="potted_plant">potted_plant</span>
</div>
</div>
<p class="text-sm font-label text-on-surface-variant text-center tracking-wide">
                        Setting up your personal environment...
                    </p>
</div>
<!-- Progress Bar at 100% -->
<div class="space-y-2">
<div class="flex justify-between text-[10px] font-label uppercase tracking-widest text-primary">
<span>Syncing Flora</span>
<span>100%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-full rounded-full shadow-[0_0_10px_rgba(105,246,184,0.5)]"></div>
</div>
</div>
</div>
</div>
<!-- Decorative Glass Cards for Bento-feel background -->
<div class="absolute top-20 left-[-10%] opacity-20 hidden lg:block">
<div class="w-64 h-80 bg-surface-bright/40 backdrop-blur-3xl rounded-lg border border-outline-variant/10 flex flex-col p-6 space-y-4">
<div class="w-12 h-12 rounded-full bg-primary/20"></div>
<div class="h-4 w-3/4 bg-on-surface-variant/20 rounded-full"></div>

<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="h-2 w-24 bg-on-surface-variant/30 rounded-full"></div>
</div>
<div class="space-y-3">
<div class="h-2 w-full bg-on-surface-variant/10 rounded-full"></div>
<div class="h-2 w-5/6 bg-on-surface-variant/10 rounded-full"></div>

</div>
