<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#10B981",
          "background-light": "#f6f8f7",
          "background-dark": "#10221c",
          "surface-container": "#1a2e26",
          "on-surface": "#e2e9e5",
          "tertiary": "#F59E0B",
          "on-tertiary": "#ffffff"
        },
        fontFamily: {
          "display": ["Plus Jakarta Sans"],
          "body": ["Plus Jakarta Sans"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }</script>
<style>
      body {
        background-color: #10221c;
        color: #e2e9e5;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .seed-shape {
        border-radius: 9999px;
      }
      .glass-morphism {
        background: rgba(16, 34, 28, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center overflow-hidden bg-background-dark text-on-surface">
<!-- Hero Background Visual -->
<div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none">
<div class="relative w-[140%] max-w-[1200px] aspect-square opacity-20 bg-gradient-to-br from-primary-container to-surface blur-[120px] rounded-full"></div>
</div>
<!-- Onboarding Container -->
<main class="relative z-10 w-full max-w-2xl px-8 flex flex-col items-center text-center">
<!-- Illustration Section -->
<div class="relative mb-12">
<!-- Seed Motif Illustration -->
<div class="w-64 h-80 rounded-full bg-surface-container overflow-hidden relative shadow-2xl shadow-emerald-950/40">
<img alt="Nurturing creative growth" class="w-full h-full object-cover mix-blend-overlay opacity-40" data-alt="A minimalist ethereal digital seed glowing with soft emerald light emerging from dark rich soil, macro photography style, dreamy atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuByWPxW9_qsL6w_10r-HNiI3FkaudWJA0-llVBMVfEE_BJJIxsoFX8Bimrffvw8jlYGZ2Cf06fZk3UuX6jCYAUFqhd7ZvwuBYrsOLhYm9PvQ8_AS8tzz950fVW8x5k3eQL-875FeqcRn8Ot4TfI2FUhC9Rdged4ixlAbCWLRxLQx8TRM7DOVIKUhmEjNcP0fmDkS7AL5BqYdpvzX2cZEqlihDqE9-zW9pD4_CZWNJS6KCGFDn9YtJUBbNRDyDzaW4lgqmZjK3vBoDQX"/>
<!-- Floating Icon Overlays -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="glass-morphism p-6 rounded-full shadow-lg">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1;">local_florist</span>
</div>
</div>
</div>
<!-- Floating Decorative Element -->
<div class="absolute -top-4 -right-4 w-20 h-20 rounded-full bg-primary/20 backdrop-blur-md border border-primary/30 flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-secondary-container text-2xl">auto_awesome</span>
</div>
</div>
<!-- Typography Cluster -->
<div class="space-y-6 max-w-lg mb-12">
<h1 class="font-display text-5xl md:text-6xl font-extrabold text-white tracking-tighter leading-[1.1]">Welcome to your <span class="text-primary italic">creativity</span> Brain</h1>
<p class="font-body text-lg md:text-xl text-on-surface/80 leading-relaxed px-4">
                Your personal AI agent in your pocket for creative thinking. Information as living matter, nurtured to help you grow.
            </p>
</div>
<!-- Action Section -->
<div class="flex flex-col items-center gap-6 w-full max-w-xs">
<!-- Primary Button -->
<button class="w-full py-5 px-10 bg-tertiary text-on-tertiary font-display font-bold text-lg rounded-full shadow-xl shadow-orange-900/20 hover:scale-[0.98] active:scale-95 transition-all duration-300 flex items-center justify-center gap-3">
                Get Started
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<!-- Tertiary Meta Info -->
<div class="flex items-center gap-2 opacity-60">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="font-label text-xs uppercase tracking-widest font-semibold text-on-surface-variant font-display">Version 1.0 Seedify</span>
<span class="w-2 h-2 rounded-full bg-primary"></span>
</div>
</div>
</main>
<!-- Decorative Elements (Asymmetric Layout) -->
<div class="fixed top-20 -left-12 w-48 h-48 bg-primary/5 rounded-full -rotate-12 pointer-events-none"></div>
<div class="w-64 h-80 rounded-full bg-surface-container overflow-hidden relative shadow-2xl shadow-emerald-950/40"></div>
<!-- Progress Indicator (Nurture Bar Style) -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 w-48 h-1 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-gradient-to-r from-primary to-inverse-primary rounded-full"></div>
</div>
</body></html>
