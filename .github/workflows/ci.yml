name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-api
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      # compileall only checks syntax per-file; it never resolves imports, so a
      # reference to a missing/renamed module (e.g. `from app.neo4j_graph import
      # ...`) passes. The static `test_all_app_module_imports_reference_existing_files`
      # contract test (in the pytest step below) closes that gap without needing
      # a live Weaviate/OpenAI, which many app modules touch at import time.
      - name: Compile Python sources
        run: python -m compileall -q app *.py scripts tests

      - name: Run tests
        run: python -m pytest -q

  publish:
    name: Publish image
    needs: [frontend, backend]
    # Only on pushes to main (not PRs), and only after tests pass.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/greenplot-api
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: openclaw-api
          file: openclaw-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Emails when a new image is published, so you know to run the host pull.
      # Uses Resend (already this project's email provider). No-op if the
      # RESEND_API_KEY repo secret is unset, so it never blocks a publish.
      # Untrusted values (commit message) are passed via env and assembled with
      # jq to avoid shell/JSON injection.
      - name: Notify (email via Resend)
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY secret not set — skipping email notification"
            exit 0
          fi
          body=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg run "$RUN_URL" \
            '{
              from: "Greenplot Deploys <digest@greenplot.ink>",
              to: ["frederick.kuenstler@gmail.com"],
              subject: ("greenplot-api image published: sha-" + $sha[0:12]),
              text: ("A new backend image is on GHCR:\n  ghcr.io/freddy503/greenplot-api:sha-" + $sha + "\n  ghcr.io/freddy503/greenplot-api:latest\n\nDeploy on the host:\n  cd ~/Greenplot/openclaw-api && docker compose pull && docker compose up -d --remove-orphans\n\nCommit: " + $msg + "\nCI run: " + $run)
            }')
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$body" >/dev/null && echo "Notification email sent"
