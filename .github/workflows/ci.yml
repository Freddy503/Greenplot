name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-api
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      # compileall only checks syntax per-file; it never resolves imports, so a
      # reference to a missing/renamed module (e.g. `from app.neo4j_graph import
      # ...`) passes. The static `test_all_app_module_imports_reference_existing_files`
      # contract test (in the pytest step below) closes that gap without needing
      # a live Weaviate/OpenAI, which many app modules touch at import time.
      - name: Compile Python sources
        run: python -m compileall -q app *.py scripts tests

      - name: Run tests
        run: python -m pytest -q
