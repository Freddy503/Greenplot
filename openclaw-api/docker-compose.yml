services:
  api:
    # Registry image is the source of truth on the server. `build` stays so
    # `docker compose build` still works locally, but the SERVER must deploy via
    # `docker compose pull` (pulls this image) — never `up --build`, which would
    # reintroduce the "running code differs from git" drift.
    image: ghcr.io/freddy503/greenplot-api:${IMAGE_TAG:-latest}
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    container_name: openclaw-api
    labels:
      com.centurylinklabs.watchtower.scope: greenplot
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_started
    environment:
    - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env}
    - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL in .env}
    - SYNC_DATABASE_URL=${SYNC_DATABASE_URL:?set SYNC_DATABASE_URL in .env}
    - WEAVIATE_URL=http://weaviate:8080
    - NEO4J_ENABLED=${NEO4J_ENABLED:-false}
    - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
    - NEO4J_USER=${NEO4J_USER:-neo4j}
    - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
    - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    - NEO4J_SYNC_ON_RETRIEVE=${NEO4J_SYNC_ON_RETRIEVE:-false}
    - NEO4J_MAX_SYNC_SEEDS=${NEO4J_MAX_SYNC_SEEDS:-1000}
    - REDIS_URL=redis://redis:6379/0
    - FRONTEND_URL=https://www.greenplot.ink
    - APP_URL=https://www.greenplot.ink
    - ADMIN_EMAILS=${ADMIN_EMAILS}
    - INVITE_CODES=${INVITE_CODES}
    - INVITE_REQUIRED=${INVITE_REQUIRED:-false}
    - CONTACT_EMAIL=${CONTACT_EMAIL}
    - EXA_API_KEY=${EXA_API_KEY}
    - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    - OPENAI_API_KEY=${OPENAI_API_KEY}
    - GROQ_API_KEY=${GROQ_API_KEY}
    - VAPID_PRIVATE_KEY_BASE64=${VAPID_PRIVATE_KEY_BASE64}
    - CORS_ORIGINS=https://seedify-six.vercel.app,https://greenplot.ink,https://www.greenplot.ink,https://api.greenplot.ink,http://localhost:3000,http://localhost:5173
    - SENTRY_DSN=${SENTRY_DSN}
    - HARVEST_API_KEY=${HARVEST_API_KEY}
    - GITHUB_TOKEN=${GITHUB_TOKEN}
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    - RESEND_API_KEY=${RESEND_API_KEY}
    ports:
    - 8001:8000
    volumes:
    # Code is baked into the image now — no `.:/app` source mount. Only durable
    # data is mounted from the host.
    - /root/.openclaw/workspace/public/wiki-images:/app/public/wiki-images
    - /root/.openclaw/workspace:/workspace
    - /root/.openclaw/wiki:/app/../wiki
  db:
    container_name: openclaw-db
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_USER: postgres
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      timeout: 5s
    image: postgres:15
    ports:
    - 127.0.0.1:5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
  enrichment-worker:
    # Same image as `api`, different command. Deploy via `docker compose pull`.
    image: ghcr.io/freddy503/greenplot-api:${IMAGE_TAG:-latest}
    build: .
    command: python -m app.task_worker
    container_name: openclaw-worker
    labels:
      com.centurylinklabs.watchtower.scope: greenplot
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_started
    environment:
    - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env}
    - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL in .env}
    - SYNC_DATABASE_URL=${SYNC_DATABASE_URL:?set SYNC_DATABASE_URL in .env}
    - WEAVIATE_URL=http://weaviate:8080
    - NEO4J_ENABLED=${NEO4J_ENABLED:-false}
    - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
    - NEO4J_USER=${NEO4J_USER:-neo4j}
    - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
    - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    - NEO4J_SYNC_ON_RETRIEVE=${NEO4J_SYNC_ON_RETRIEVE:-false}
    - NEO4J_MAX_SYNC_SEEDS=${NEO4J_MAX_SYNC_SEEDS:-1000}
    - REDIS_URL=redis://redis:6379/0
    - EXA_API_KEY=${EXA_API_KEY}
    - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    - OPENAI_API_KEY=${OPENAI_API_KEY}
    - GROQ_API_KEY=${GROQ_API_KEY}
    - SENTRY_DSN=${SENTRY_DSN}
    - HARVEST_API_KEY=${HARVEST_API_KEY}
    restart: unless-stopped
  redis:
    container_name: openclaw-redis
    image: redis:7
    command: redis-server --appendonly yes
    ports:
    - 127.0.0.1:6379:6379
    volumes:
    - redis_data:/data
  weaviate:
    container_name: openclaw-weaviate
    depends_on:
      db:
        condition: service_healthy
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      CLUSTER_HOSTNAME: node1
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: text2vec-openai,text2vec-huggingface,ref2vec-centroid,generative-openai,qna-openai
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 20
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.6
    # No host port publish: the API reaches Weaviate over the internal Docker
    # network (WEAVIATE_URL=http://weaviate:8080). Publishing 8080 to the host
    # collided with another project's Weaviate already bound there, which kept
    # this container from ever starting.
    volumes:
    - weaviate_data:/var/lib/weaviate
  neo4j:
    container_name: greenplot-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-greenplot-dev-change-me}
      NEO4J_dbms_security_auth__enabled: 'true'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    image: neo4j:5-community
    ports:
    - 127.0.0.1:7474:7474
    - 127.0.0.1:7687:7687
    profiles:
    - graph
    volumes:
    - neo4j_data:/data
  # Optional pull-based auto-deploy. Watches the GHCR image and recreates only
  # the scoped (api/worker) containers when CI publishes a new build — no
  # inbound SSH, no deploy key stored in GitHub. Opt in on the server with:
  #   docker compose --profile autodeploy up -d watchtower
  # Requires a one-time `docker login ghcr.io` on the host (a read:packages
  # token), which writes the ~/.docker/config.json mounted below.
  watchtower:
    image: containrrr/watchtower
    container_name: greenplot-watchtower
    profiles:
    - autodeploy
    command: --interval 120 --cleanup --scope greenplot
    environment:
      WATCHTOWER_SCOPE: greenplot
    restart: unless-stopped
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - /root/.docker/config.json:/config.json:ro
volumes:
  # External volumes — immune to `docker compose down -v`.
  # These reference the volumes already on the server (openclaw-api_* prefix
  # was assigned by Docker Compose when the project was first created).
  postgres_data:
    external: true
    name: openclaw-api_postgres_data
  redis_data:
    external: true
    name: openclaw-api_redis_data
  weaviate_data:
    external: true
    name: openclaw-api_weaviate_data
  neo4j_data: {}
