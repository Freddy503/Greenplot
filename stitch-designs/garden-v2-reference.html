<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<!-- 
  STITCH GARDEN PAGE — GREENPLOT REFERENCE
  Colors: primary=#69f6b8, bg=#01120b, secondary=#f8a010
  This is the design reference. Must be converted to React components.
-->
<body class="bg-[#01120b] text-[#e4fcf0] font-['Plus_Jakarta_Sans']">

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-[#01120b]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-full overflow-hidden bg-[#0d2b21]">
      <!-- User avatar placeholder -->
    </div>
    <span class="text-xl font-bold tracking-tighter text-[#69f6b8]">Seedify</span>
  </div>
  <div class="flex items-center gap-6">
    <button class="material-symbols-outlined text-[#9ab0a5] hover:bg-[#0d2b21] transition-colors p-2 rounded-full">search</button>
    <button class="text-[#9ab0a5] text-sm uppercase tracking-widest hover:bg-[#0d2b21] px-3 py-1 rounded-full">Chat</button>
  </div>
</header>

<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto">

  <!-- Knowledge Toggle -->
  <div class="flex justify-center mb-8">
    <div class="bg-[#021710] p-1.5 rounded-full flex items-center w-full max-w-[280px]">
      <button class="flex-1 py-2 px-4 rounded-full text-sm font-bold text-[#9ab0a5] transition-all">Chat</button>
      <button class="flex-1 py-2 px-4 rounded-full text-sm font-bold bg-gradient-to-br from-[#69f6b8] to-[#06b77f] text-[#005a3c] shadow-lg">Garden</button>
    </div>
  </div>

  <!-- Section Hero -->
  <section class="mb-8 px-2">
    <h1 class="text-3xl font-extrabold tracking-tight mb-2 leading-tight">Knowledge <span class="text-[#69f6b8]">Garden</span></h1>
    <p class="text-[#9ab0a5] text-sm leading-relaxed max-w-xs">Cultivating intelligence through structured organic seeds of thought.</p>
  </section>

  <!-- Notion-inspired Table-like List -->
  <div class="bg-[#021710] rounded-lg overflow-hidden border border-[#384c43]/10">
    <!-- Table Header -->
    <div class="grid grid-cols-[48px_1fr_80px] px-4 py-3 border-b border-[#384c43]/10 text-[10px] uppercase tracking-[0.1em] text-[#9ab0a5] font-bold">
      <div>Type</div>
      <div>Seed Title</div>
      <div class="text-right">Status</div>
    </div>
    <!-- Seed rows -->
    <div class="divide-y divide-[#384c43]/5">
      <!-- Each row: icon | title+tags | status -->
    </div>
  </div>

  <!-- Featured Growth Card -->
  <div class="mt-10 relative overflow-hidden rounded-lg bg-[#051e15] p-6 border border-[#69f6b8]/10">
    <div class="absolute -right-10 -top-10 w-40 h-40 bg-[#69f6b8]/5 rounded-full blur-3xl"></div>
    <div class="relative z-10">
      <span class="inline-block px-3 py-1 rounded-full bg-[#f8a010]/20 text-[#f8a010] text-[10px] font-bold uppercase tracking-widest mb-4">Focus Seed</span>
      <h4 class="text-xl font-bold mb-2">Neural Foraging Techniques</h4>
      <p class="text-[#9ab0a5] text-xs leading-relaxed mb-4">Your garden is currently processing 12 signals to enrich this specific seed. Estimated bloom in 4 hours.</p>
      <div class="w-full bg-[#021710] h-1.5 rounded-full overflow-hidden">
        <div class="bg-gradient-to-r from-[#69f6b8] to-[#06b77f] h-full w-[65%] rounded-full shadow-[0_0_8px_rgba(105,246,184,0.4)]"></div>
      </div>
    </div>
  </div>

</main>

<!-- FAB -->
<button class="fixed bottom-28 right-6 w-14 h-14 bg-[#f8a010] rounded-full shadow-lg shadow-[#f8a010]/30 flex items-center justify-center text-[#4a2c00] active:scale-90 transition-transform z-40">
  <span class="material-symbols-outlined text-2xl font-bold">add</span>
</button>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#021710]/80 backdrop-blur-xl rounded-t-[32px] shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.4)] flex justify-around items-center px-4 pb-6 pt-2">
  <div class="flex flex-col items-center justify-center text-[#9ab0a5] p-3"><span class="material-symbols-outlined">home</span></div>
  <div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#69f6b8] to-[#06b77f] text-[#005a3c] rounded-full p-3"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">psychiatry</span></div>
  <div class="flex flex-col items-center justify-center text-[#9ab0a5] p-3"><span class="material-symbols-outlined">search</span></div>
  <div class="flex flex-col items-center justify-center text-[#9ab0a5] p-3"><span class="material-symbols-outlined">settings</span></div>
</nav>

</body></html>
