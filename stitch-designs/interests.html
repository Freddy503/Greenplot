<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seedify Onboarding - Interest Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#09241b",
              "on-secondary-fixed": "#4c2e00",
              "inverse-primary": "#006d4a",
              "surface-dim": "#01120b",
              "surface-bright": "#123227",
              "on-tertiary-fixed": "#004b33",
              "secondary-container": "#855300",
              "primary-dim": "#58e7ab",
              "tertiary-fixed": "#6bffc1",
              "surface": "#01120b",
              "secondary-fixed-dim": "#ffb554",
              "on-tertiary-container": "#006042",
              "inverse-surface": "#e7fff2",
              "secondary-fixed": "#ffc885",
              "tertiary-fixed-dim": "#5af0b4",
              "surface-variant": "#0d2b21",
              "primary-fixed": "#69f6b8",
              "on-tertiary": "#006948",
              "on-primary-container": "#002919",
              "on-secondary-fixed-variant": "#724700",
              "error": "#ff716c",
              "error-dim": "#d7383b",
              "surface-container-highest": "#0d2b21",
              "on-primary": "#005a3c",
              "on-error": "#490006",
              "on-error-container": "#ffa8a3",
              "on-secondary": "#4a2c00",
              "tertiary-dim": "#5af0b4",
              "secondary": "#f8a010",
              "surface-container-lowest": "#000000",
              "on-background": "#e4fcf0",
              "surface-tint": "#69f6b8",
              "surface-container-low": "#021710",
              "outline": "#657a70",
              "on-surface": "#e4fcf0",
              "on-primary-fixed": "#00452d",
              "outline-variant": "#384c43",
              "tertiary-container": "#6bffc1",
              "surface-container": "#051e15",
              "primary": "#69f6b8",
              "primary-fixed-dim": "#58e7ab",
              "background": "#01120b",
              "on-tertiary-fixed-variant": "#006b4a",
              "primary-container": "#06b77f",
              "error-container": "#9f0519",
              "inverse-on-surface": "#455950",
              "on-surface-variant": "#9ab0a5",
              "secondary-dim": "#e79400",
              "on-secondary-container": "#fff6f0",
              "tertiary": "#cdffe3",
              "on-primary-fixed-variant": "#006544"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #01120b;
            color: #e4fcf0;
            margin: 0;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(18, 50, 39, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-glow {
            box-shadow: 0 0 15px rgba(105, 246, 184, 0.3);
        }
        .chip-selected {
            background: linear-gradient(135deg, #69f6b8, #06b77f);
            color: #002919;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Not shown for onboarding per "Destination Rule" -->
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12 max-w-2xl mx-auto w-full relative">
<!-- Background Ambient Glows -->
<div class="absolute top-[-10%] right-[-20%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Progress Indicator -->
<div class="w-full mb-12 flex flex-col gap-4">
<div class="flex justify-between items-end">
<span class="text-label-md font-bold uppercase tracking-[0.1em] text-on-surface-variant">Step 3 of 7</span>
<span class="text-label-md font-bold text-primary">Cultivating Interests</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-[42.8%] bg-primary progress-glow rounded-full transition-all duration-700 ease-out"></div>
</div>
</div>
<!-- Header Section -->
<div class="w-full text-left mb-10">
<h1 class="text-[2.5rem] leading-[1.1] font-extrabold tracking-[-0.04em] text-on-surface mb-4">
                What seeds should <br/> we plant?
            </h1>
<p class="text-headline-sm text-on-surface-variant max-w-md leading-relaxed">
                Select topics that excite you to curate your digital garden.
            </p>
</div>
<!-- Multi-select Chips Bento -->
<div class="w-full flex flex-wrap gap-3 mb-8">
<!-- Technology (Selected) -->
<button class="chip-selected flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="rocket_launch">rocket_launch</span>
                Technology
            </button>
<!-- Business trends -->
<button class="bg-surface-container hover:bg-surface-container-highest text-on-surface-variant hover:text-on-surface flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="trending_up">trending_up</span>
                Business trends
            </button>
<!-- Entrepreneurship (Selected) -->
<button class="chip-selected flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="lightbulb">lightbulb</span>
                Entrepreneurship
            </button>
<!-- AI -->
<button class="bg-surface-container hover:bg-surface-container-highest text-on-surface-variant hover:text-on-surface flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="memory">memory</span>
                AI
            </button>
<!-- Design -->
<button class="bg-surface-container hover:bg-surface-container-highest text-on-surface-variant hover:text-on-surface flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="palette">palette</span>
                Design
            </button>
<!-- Productivity (Selected) -->
<button class="chip-selected flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="bolt">bolt</span>
                Productivity
            </button>
<!-- Learning -->
<button class="bg-surface-container hover:bg-surface-container-highest text-on-surface-variant hover:text-on-surface flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="menu_book">menu_book</span>
                Learning
            </button>
<!-- Creativity -->
<button class="bg-surface-container hover:bg-surface-container-highest text-on-surface-variant hover:text-on-surface flex items-center px-6 py-3.5 rounded-full font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="auto_awesome">auto_awesome</span>
                Creativity
            </button>
</div>
<!-- Custom Input Field -->
<div class="w-full mb-12">
<div class="group relative">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="add_circle">add_circle</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-[1rem] py-5 pl-14 pr-6 text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary transition-all outline-none" placeholder="Add your own" type="text"/>
</div>
</div>
<!-- Sticky Bottom Action (But still part of flow) -->
<div class="w-full flex items-center justify-between gap-6 pt-4 border-t border-outline-variant/10">
<button class="text-on-surface-variant hover:text-on-surface font-bold text-sm tracking-wide uppercase px-4 transition-colors">
                Back
            </button>
<button class="flex-1 bg-gradient-to-br from-primary to-primary-container text-on-primary font-extrabold text-base py-5 px-8 rounded-full shadow-[0_12px_30px_-10px_rgba(105,246,184,0.4)] hover:shadow-[0_15px_40px_-10px_rgba(105,246,184,0.6)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Continue
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Side Visual (Subtle Glass Overlay) -->
<div class="hidden lg:block fixed right-0 top-0 bottom-0 w-1/4 pointer-events-none overflow-hidden">
<div class="h-full w-full relative">
<div class="absolute inset-0 bg-gradient-to-l from-primary/5 to-transparent"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] aspect-square border border-primary/20 rounded-full animate-pulse opacity-20"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60%] aspect-square border border-primary/30 rounded-full opacity-10"></div>
</div>
</div>
<!-- Navigation suppression check: BottomNavBar suppressed for Onboarding -->
</body></html>
